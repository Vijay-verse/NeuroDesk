<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Brain icon -->
  <g transform="translate(256,240)" fill="none" stroke="url(#glow)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left hemisphere -->
    <path d="M-8,-80 C-60,-80 -100,-50 -100,0 C-100,30 -85,55 -60,65 C-65,85 -45,100 -20,100 C-10,100 -8,95 -8,95"/>
    <path d="M-8,-80 C-40,-75 -65,-45 -65,-10"/>
    <path d="M-8,-30 C-40,-25 -60,0 -55,30"/>
    <!-- Right hemisphere -->
    <path d="M8,-80 C60,-80 100,-50 100,0 C100,30 85,55 60,65 C65,85 45,100 20,100 C10,100 8,95 8,95"/>
    <path d="M8,-80 C40,-75 65,-45 65,-10"/>
    <path d="M8,-30 C40,-25 60,0 55,30"/>
    <!-- Center line -->
    <line x1="0" y1="-80" x2="0" y2="100"/>
  </g>
  <!-- NeuroDesk text -->
  <text x="256" y="420" text-anchor="middle" fill="white" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="52" letter-spacing="4">NEURODESK</text>
</svg>
